<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Finance | Reset Password</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            background: #ffffff;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }

        .reset-card {
            width: 100%;
            max-width: 400px;
        }

        .reset-card h1 {
            font-size: 28px;
            font-weight: 800;
            color: #0f172a;
            margin-bottom: 6px;
            text-align: center;
        }

        .reset-card .subtitle {
            text-align: center;
            color: #64748b;
            font-size: 14px;
            margin-bottom: 32px;
        }

        .form-group { margin-bottom: 18px; }

        .form-group label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            color: #1e293b;
            margin-bottom: 6px;
        }

        .form-group input {
            width: 100%;
            height: 48px;
            padding: 0 14px;
            border: 1.5px solid #e2e8f0;
            border-radius: 10px;
            font-size: 15px;
            color: #1e293b;
            background: #fff;
            transition: border-color 0.2s, box-shadow 0.2s;
            outline: none;
        }

        .form-group input:focus {
            border-color: #6d28d9;
            box-shadow: 0 0 0 3px rgba(109,40,217,0.1);
        }

        .password-wrap { position: relative; }
        .password-wrap input { padding-right: 44px; }

        .toggle-pw {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            color: #94a3b8;
            font-size: 18px;
            line-height: 1;
            transition: color 0.2s;
        }
        .toggle-pw:hover { color: #475569; }

        .btn-login {
            width: 100%;
            height: 48px;
            background: #6d28d9;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
            box-shadow: 0 4px 14px rgba(109,40,217,0.3);
            margin-top: 8px;
        }

        .btn-login:hover:not(:disabled) {
            background: #5b21b6;
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(109,40,217,0.4);
        }

        .btn-login:disabled { opacity: 0.7; cursor: not-allowed; }

        #reset-msg {
            border-radius: 8px;
            padding: 10px 14px;
            font-size: 13px;
            margin-bottom: 16px;
            display: none;
        }

        #reset-msg.error {
            background: rgba(239,68,68,0.08);
            border: 1px solid rgba(239,68,68,0.25);
            color: #ef4444;
        }

        #reset-msg.success {
            background: rgba(34,197,94,0.08);
            border: 1px solid rgba(34,197,94,0.3);
            color: #16a34a;
        }

        .back-link {
            text-align: center;
            margin-top: 20px;
            font-size: 14px;
        }

        .back-link a {
            color: #6d28d9;
            text-decoration: none;
            font-weight: 600;
        }

        .back-link a:hover { text-decoration: underline; }
    </style>
</head>
<body>

<div class="reset-card">
    <h1>Reset Password</h1>
    <p class="subtitle">Enter your new password below</p>

    <div id="reset-msg"></div>

    <div id="reset-form">
        <div class="form-group">
            <label for="new-password">New Password</label>
            <div class="password-wrap">
                <input type="password" id="new-password" placeholder="••••••••">
                <button type="button" class="toggle-pw" id="toggle-new-pw" onclick="toggleVisibility('new-password', 'toggle-new-pw')">👁</button>
            </div>
        </div>

        <div class="form-group">
            <label for="confirm-password">Confirm Password</label>
            <div class="password-wrap">
                <input type="password" id="confirm-password" placeholder="••••••••">
                <button type="button" class="toggle-pw" id="toggle-confirm-pw" onclick="toggleVisibility('confirm-password', 'toggle-confirm-pw')">👁</button>
            </div>
        </div>

        <button type="button" class="btn-login" id="reset-btn">Reset Password</button>
    </div>

    <div class="back-link">
        <a href="login.html">← Back to login</a>
    </div>
</div>

<script>
    const BASE_URL = (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1')
        ? 'http://localhost:5000'
        : 'https://ai-finance-analyzer-abas.onrender.com';

    // Extract token from URL
    let token = new URLSearchParams(window.location.search).get('token');

    // Validate token on page load
    if (!token || token.trim() === '') {
        showMsg('Invalid reset link. Please request a new one.', 'error');
        document.getElementById('reset-form').style.display = 'none';
    }

    function showMsg(msg, type) {
        const el = document.getElementById('reset-msg');
        el.textContent = msg;
        el.classList.remove('success', 'error');
        el.classList.add(type);
        el.style.display = 'block';
    }

    function toggleVisibility(inputId, btnId) {
        const input = document.getElementById(inputId);
        const btn = document.getElementById(btnId);
        const isVisible = input.type === 'text';
        input.type = isVisible ? 'password' : 'text';
        btn.textContent = isVisible ? '👁' : '🙈';
    }

    document.getElementById('reset-btn').addEventListener('click', async function () {
        const newPassword = document.getElementById('new-password').value;
        const confirmPassword = document.getElementById('confirm-password').value;
        const btn = document.getElementById('reset-btn');

        if (newPassword !== confirmPassword) {
            showMsg('Passwords do not match.', 'error');
            return;
        }

        if (newPassword.length < 6) {
            showMsg('Password must be at least 6 characters.', 'error');
            return;
        }

        btn.disabled = true;
        btn.textContent = 'Resetting...';

        try {
            const res = await fetch(`${BASE_URL}/api/reset-password`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ token, newPassword })
            });
            const data = await res.json();

            if (res.ok) {
                showMsg('Password reset! Redirecting to login...', 'success');
                setTimeout(() => {
                    window.location.href = 'login.html';
                }, 2000);
            } else {
                showMsg(data.message, 'error');
            }
        } catch (err) {
            showMsg('Server offline. Please check if backend is running.', 'error');
        } finally {
            btn.disabled = false;
            btn.textContent = 'Reset Password';
        }
    });
</script>

</body>
</html>
