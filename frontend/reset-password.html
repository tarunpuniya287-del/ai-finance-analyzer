<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Finance | Reset Password</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', 'Segoe UI', Roboto, sans-serif;
            min-height: 100svh;
            background: linear-gradient(135deg, #ede9fe 0%, #f5f3ff 50%, #ffffff 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 24px 16px calc(24px + env(safe-area-inset-bottom));
        }

        /* ── Brand header ── */
        .brand-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 28px;
            color: #6d28d9;
            font-size: 18px; font-weight: 800;
            letter-spacing: -.02em;
        }
        .brand-icon {
            width: 38px; height: 38px;
            background: linear-gradient(135deg, #7c3aed, #6d28d9);
            border-radius: 11px;
            display: flex; align-items: center; justify-content: center;
            font-size: 18px; color: #fff;
            box-shadow: 0 4px 12px rgba(109,40,217,.3);
        }

        /* ── Card ── */
        .reset-card {
            width: 100%;
            max-width: 420px;
            background: #ffffff;
            border-radius: 20px;
            padding: 32px 28px 28px;
            box-shadow: 0 8px 40px rgba(109,40,217,.1), 0 2px 8px rgba(0,0,0,.06);
            border: 1px solid rgba(109,40,217,.08);
        }

        .card-icon-wrap {
            width: 56px; height: 56px;
            background: linear-gradient(135deg, #ede9fe, #ddd6fe);
            border-radius: 16px;
            display: flex; align-items: center; justify-content: center;
            font-size: 26px;
            margin: 0 auto 18px;
        }

        .reset-card h1 {
            font-size: 24px; font-weight: 800;
            color: #0f172a; margin-bottom: 6px;
            text-align: center; letter-spacing: -.025em;
        }

        .subtitle {
            text-align: center;
            color: #64748b; font-size: 14px;
            margin-bottom: 28px; line-height: 1.5;
        }

        /* ── Form ── */
        .form-group { margin-bottom: 16px; }

        .form-group label {
            display: block;
            font-size: 13px; font-weight: 600;
            color: #1e293b; margin-bottom: 6px;
        }

        .form-group input {
            width: 100%; height: 48px;
            padding: 0 14px;
            border: 1.5px solid #e2e8f0;
            border-radius: 12px;
            font-size: 16px;
            font-family: inherit;
            color: #1e293b; background: #fff;
            transition: border-color .2s, box-shadow .2s;
            outline: none;
            -webkit-appearance: none;
        }

        .form-group input:focus {
            border-color: #6d28d9;
            box-shadow: 0 0 0 3px rgba(109,40,217,.1);
        }

        .password-wrap { position: relative; }
        .password-wrap input { padding-right: 48px; }

        .toggle-pw {
            position: absolute; right: 14px; top: 50%;
            transform: translateY(-50%);
            background: none; border: none; cursor: pointer;
            color: #94a3b8; font-size: 18px; line-height: 1;
            transition: color .2s; padding: 0;
            min-width: 28px; min-height: 28px;
            display: flex; align-items: center; justify-content: center;
        }
        .toggle-pw:hover { color: #475569; }

        /* ── Password strength bar ── */
        .strength-bar-wrap {
            margin-top: 8px;
            height: 4px; border-radius: 999px;
            background: #f1f5f9; overflow: hidden;
        }
        .strength-bar {
            height: 100%; border-radius: 999px;
            transition: width .3s ease, background .3s ease;
            width: 0%;
        }
        .strength-label {
            font-size: 11px; font-weight: 600;
            margin-top: 4px; text-align: right;
            min-height: 16px;
        }

        /* ── Message box ── */
        #reset-msg {
            border-radius: 10px;
            padding: 10px 14px;
            font-size: 13px; font-weight: 500;
            margin-bottom: 16px; display: none;
            line-height: 1.5;
        }
        #reset-msg.error {
            background: rgba(239,68,68,.08);
            border: 1px solid rgba(239,68,68,.25);
            color: #ef4444;
        }
        #reset-msg.success {
            background: rgba(34,197,94,.08);
            border: 1px solid rgba(34,197,94,.3);
            color: #16a34a;
        }

        /* ── Button ── */
        .btn-reset {
            width: 100%; height: 50px;
            background: linear-gradient(135deg, #7c3aed, #6d28d9);
            color: #fff; border: none;
            border-radius: 12px;
            font-size: 15px; font-weight: 700;
            font-family: inherit; cursor: pointer;
            transition: opacity .2s, transform .15s, box-shadow .2s;
            box-shadow: 0 4px 14px rgba(109,40,217,.35);
            margin-top: 6px;
            display: flex; align-items: center; justify-content: center; gap: 8px;
        }
        .btn-reset:hover:not(:disabled) {
            opacity: .92; transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(109,40,217,.45);
        }
        .btn-reset:active:not(:disabled) { transform: translateY(0); }
        .btn-reset:disabled { opacity: .65; cursor: not-allowed; }

        /* ── Back link ── */
        .back-link {
            text-align: center; margin-top: 20px;
            font-size: 14px; color: #64748b;
        }
        .back-link a {
            color: #6d28d9; text-decoration: none; font-weight: 600;
        }
        .back-link a:hover { text-decoration: underline; }

        /* ── Spinner ── */
        .spinner {
            width: 18px; height: 18px;
            border: 2px solid rgba(255,255,255,.4);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin .7s linear infinite;
            flex-shrink: 0;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ── Mobile tweaks ── */
        @media (max-width: 480px) {
            body { padding: 20px 12px calc(20px + env(safe-area-inset-bottom)); }
            .reset-card { padding: 24px 20px 20px; border-radius: 16px; }
            .reset-card h1 { font-size: 22px; }
            .brand-header { margin-bottom: 20px; }
        }
    </style>
</head>
<body>

<!-- Brand header -->
<div class="brand-header">
    <div class="brand-icon">💰</div>
    AI Finance Pro
</div>

<div class="reset-card">
    <div class="card-icon-wrap">🔐</div>
    <h1>Reset Password</h1>
    <p class="subtitle">Enter your new password below.<br>Make it strong and memorable.</p>

    <div id="reset-msg"></div>

    <div id="reset-form">
        <div class="form-group">
            <label for="new-password">New Password</label>
            <div class="password-wrap">
                <input type="password" id="new-password" placeholder="Min. 6 characters"
                       oninput="checkStrength(this.value)" autocomplete="new-password">
                <button type="button" class="toggle-pw" id="toggle-new-pw"
                        onclick="toggleVisibility('new-password', 'toggle-new-pw')">👁</button>
            </div>
            <div class="strength-bar-wrap">
                <div class="strength-bar" id="strengthBar"></div>
            </div>
            <div class="strength-label" id="strengthLabel" style="color:#94a3b8;"></div>
        </div>

        <div class="form-group">
            <label for="confirm-password">Confirm Password</label>
            <div class="password-wrap">
                <input type="password" id="confirm-password" placeholder="Re-enter password"
                       autocomplete="new-password">
                <button type="button" class="toggle-pw" id="toggle-confirm-pw"
                        onclick="toggleVisibility('confirm-password', 'toggle-confirm-pw')">👁</button>
            </div>
        </div>

        <button type="button" class="btn-reset" id="reset-btn">
            <span>Reset Password</span>
        </button>
    </div>

    <div class="back-link">
        <a href="login.html">← Back to login</a>
    </div>
</div>

<script>
    const BASE_URL = (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1')
        ? 'http://localhost:5000'
        : 'https://ai-finance-analyzer-5em3.onrender.com';

    let token = new URLSearchParams(window.location.search).get('token');

    if (!token || token.trim() === '') {
        showMsg('Invalid or expired reset link. Please request a new one from the login page.', 'error');
        document.getElementById('reset-form').style.display = 'none';
    }

    function showMsg(msg, type) {
        const el = document.getElementById('reset-msg');
        el.textContent = msg;
        el.className = type;
        el.style.display = 'block';
    }

    function toggleVisibility(inputId, btnId) {
        const input = document.getElementById(inputId);
        const btn   = document.getElementById(btnId);
        const isVis = input.type === 'text';
        input.type  = isVis ? 'password' : 'text';
        btn.textContent = isVis ? '👁' : '🙈';
    }

    function checkStrength(val) {
        const bar   = document.getElementById('strengthBar');
        const label = document.getElementById('strengthLabel');
        let score = 0;
        if (val.length >= 8)           score++;
        if (/[A-Z]/.test(val))         score++;
        if (/[0-9]/.test(val))         score++;
        if (/[^A-Za-z0-9]/.test(val)) score++;

        const states = [
            { w: '0%',   bg: '',        txt: '',          color: '#94a3b8' },
            { w: '25%',  bg: '#ef4444', txt: 'Weak',      color: '#ef4444' },
            { w: '50%',  bg: '#f59e0b', txt: 'Fair',      color: '#f59e0b' },
            { w: '75%',  bg: '#3b82f6', txt: 'Good',      color: '#3b82f6' },
            { w: '100%', bg: '#16a34a', txt: 'Strong ✓',  color: '#16a34a' },
        ];
        const s = val.length === 0 ? states[0] : (states[score] || states[1]);
        bar.style.width      = s.w;
        bar.style.background = s.bg;
        label.textContent    = s.txt;
        label.style.color    = s.color;
    }

    document.getElementById('reset-btn').addEventListener('click', async function () {
        const newPassword = document.getElementById('new-password').value;
        const confirmPw   = document.getElementById('confirm-password').value;
        const btn         = document.getElementById('reset-btn');

        if (!newPassword || !confirmPw) {
            showMsg('Please fill in both password fields.', 'error');
            return;
        }
        if (newPassword !== confirmPw) {
            showMsg('Passwords do not match. Please try again.', 'error');
            return;
        }
        if (newPassword.length < 6) {
            showMsg('Password must be at least 6 characters long.', 'error');
            return;
        }

        btn.disabled = true;
        btn.innerHTML = '<div class="spinner"></div><span>Resetting…</span>';

        try {
            const res  = await fetch(`${BASE_URL}/api/reset-password`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ token, newPassword })
            });
            const data = await res.json();

            if (res.ok) {
                showMsg('✅ Password reset successfully! Redirecting to login…', 'success');
                setTimeout(() => { window.location.href = 'login.html'; }, 2200);
            } else {
                showMsg(data.message || 'Something went wrong. Please try again.', 'error');
            }
        } catch (err) {
            showMsg('Cannot reach the server. Please check your connection.', 'error');
        } finally {
            btn.disabled = false;
            btn.innerHTML = '<span>Reset Password</span>';
        }
    });
</script>

</body>
</html>
